name: event_driver
description: EventDriver - Aplikasi manajemen pengiriman alat event untuk driver.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  postgres: ^3.5.12
  bcrypt: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
